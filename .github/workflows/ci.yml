name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: credit_card_rewards
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d credit_card_rewards"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: credit_card_rewards

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy (database/models.py, tools/, agents/, strict)
        run: mypy database/models.py tools/calculator.py tools/retriever.py agents/ backend/ services/ monitoring/

      - name: Apply migrations
        run: alembic upgrade head

      - name: Seed the 5-card MVP corpus
        run: python -m database.seed

      # No live LLM endpoint is needed here: the graph's two LLM-touching nodes are mocked
      # in tests/conftest.py, so pytest exercises the real HTTP/DB/calculator/retriever paths
      # without a live API call (Section 18.3's "Agent" test type run against the compiled
      # graph directly).
      - name: pytest (unit + integration + agent)
        run: pytest --cov --cov-report=term-missing

      # Golden-set gates (Section 18.4): these are non-negotiable per the implementation
      # guide - block the merge rather than let calculation drift or an ungrounded claim in.
      # All four run the deterministic core directly (no LLM), same reasoning as above.
      - name: Calculation accuracy gate (must be 100%)
        run: python -m evaluation.calculation_eval

      - name: Monthly-optimization accuracy gate (must be 100%)
        run: python -m evaluation.monthly_optimization_eval

      - name: Retrieval precision@5 gate (must be >= 0.75)
        run: python -m evaluation.rag_eval

      - name: Grounding / hallucination gate (must be 0% ungrounded)
        run: python -m evaluation.hallucination_eval
