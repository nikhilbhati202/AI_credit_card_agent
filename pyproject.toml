[project]
name = "credit-card-rewards-agent"
version = "0.1.0"
description = "Intelligent Credit Card & Rewards Optimization Agent"
requires-python = ">=3.12,<3.13"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]
# B008: FastAPI's Depends()-as-default-argument is the framework's own documented pattern
# for dependency injection, not the mutable-default-argument bug this rule targets.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
# Alembic-autogenerated migrations are boilerplate we don't hand-reformat on
# every revision; hold hand-written code everywhere else to the full rule set.
"database/migrations/versions/*.py" = ["E501", "UP007", "UP035"]
# docs_gen/ generates the Technical Design Document: its content is prose strings and ASCII
# diagrams (not hand-maintained application logic), so line-length wrapping would only hurt
# readability of the source text without improving anything a reader of docs_gen/ cares about.
"docs_gen/*.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true

# Implementation guide, Section 4: strict mode on agents/, tools/, and database/models.py.
[[tool.mypy.overrides]]
module = [
    "database.models",
    "tools.calculator",
    "tools.retriever",
    "tools.transfer_calculator",
    "agents.state",
    "agents.llm",
    "agents.graph",
    "agents.nodes.*",
]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["backend", "database", "tools", "services", "rag", "agents", "monitoring"]
