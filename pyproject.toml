[project]
name = "credit-card-rewards-agent"
version = "0.1.0"
description = "Intelligent Credit Card & Rewards Optimization Agent"
requires-python = ">=3.12,<3.13"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "N"]

[tool.ruff.lint.per-file-ignores]
# Alembic-autogenerated migrations are boilerplate we don't hand-reformat on
# every revision; hold hand-written code everywhere else to the full rule set.
"database/migrations/versions/*.py" = ["E501", "UP007", "UP035"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true

# Implementation guide, Section 4: strict mode on agents/, tools/, and
# database/models.py at minimum. agents/ and tools/ don't exist until Phase 1+;
# database/models.py is held to that bar from Phase 0 since it's the schema contract.
[[tool.mypy.overrides]]
module = ["database.models"]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["backend", "database"]
